<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../resources/css/styles.css">
    <link rel="stylesheet" href="../resources/css/navbar.css">
    <link rel="stylesheet" href="../resources/css/search.css">
    <title>Search</title>
</head>

<body>
    <nav class="navbar">
        <ul class="nav-list">
            <li class="nav-item"><a href="/">Home</a></li>
            <li class="nav-item"><a href="/html/features.html">Features</a></li>
            <li class="nav-item"><a href="/directory">Directory</a></li>
            <li class="nav-item"><a href="/html/search.html">Search</a></li>
            <li class="nav-item"><a href="/">About Us</a></li>
            <li class="nav-item language-selector dropdown">
                <button id="dropdown-btn">
                    <img src="https://flagsapi.com/US/shiny/64.png" alt="Flag" style="width: 25px; height: 20px; vertical-align: middle;">
                    <span class="btn-text">English</span>
                    <span class="arrow-down"></span>
                </button>
                          
                <ul class="dropdown-content" id="dropdown-content">
                    <li data-lang="en">
                        <img src="https://flagsapi.com/US/shiny/64.png" alt="English Flag" style="width: 25px; height: 20px; vertical-align: middle;"> English
                    </li>
                    <li data-lang="fr">
                        <img src="https://flagsapi.com/FR/shiny/64.png" alt="French Flag" style="width: 25px; height: 20px; vertical-align: middle;"> Français
                    </li>
                </ul>
            </li>
        </ul>
    </nav>

    <div class="search-container">
        <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" 
            class="google-logo"
            alt="Google logo" />
        <form method="POST" action="/search">
            <div class="search-bar">
                <svg height="21" viewBox="0 0 21 21" width="21" xmlns="http://www.w3.org/2000/svg">
                    <g fill="none" fill-rule="evenodd" stroke="#808080" stroke-linecap="round" stroke-linejoin="round"><circle cx="8.5" cy="8.5" r="5" /><path d="m17.571 17.5-5.571-5.5" />
                    </g>
                </svg>
                <input type="text" name="q" placeholder="Search...">
            </div>
            <div class="button-container">
                <button type="submit" class="search-btn">Google Search</button>
            </div>
        </form>
    </div>
    
</body>

</html>
